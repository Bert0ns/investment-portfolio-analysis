<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="transparent" />
  
  <!-- Outer orbital ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#neonGradient)" stroke-width="6" filter="url(#neonGlow)" />
  
  <!-- Inner tech nodes -->
  <circle cx="50" cy="50" r="14" fill="#22d3ee" filter="url(#neonGlow)" />
  <circle cx="22" cy="50" r="6" fill="#3b82f6" filter="url(#neonGlow)" />
  <circle cx="78" cy="50" r="6" fill="#3b82f6" filter="url(#neonGlow)" />
  <circle cx="50" cy="22" r="6" fill="#3b82f6" filter="url(#neonGlow)" />
  <circle cx="50" cy="78" r="6" fill="#3b82f6" filter="url(#neonGlow)" />
  
  <!-- Connecting lines -->
  <line x1="28" y1="50" x2="36" y2="50" stroke="url(#neonGradient)" stroke-width="4" filter="url(#neonGlow)" />
  <line x1="64" y1="50" x2="72" y2="50" stroke="url(#neonGradient)" stroke-width="4" filter="url(#neonGlow)" />
  <line x1="50" y1="28" x2="50" y2="36" stroke="url(#neonGradient)" stroke-width="4" filter="url(#neonGlow)" />
  <line x1="50" y1="64" x2="50" y2="72" stroke="url(#neonGradient)" stroke-width="4" filter="url(#neonGlow)" />
</svg>
